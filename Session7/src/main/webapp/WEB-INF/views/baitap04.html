<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết món ăn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">Chi Tiết Món Ăn Vừa Thêm</h4>
        </div>
        <div class="card-body">
            <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

            <table class="table table-bordered mt-3" th:if="${newFood}">
                <tr>
                    <th width="35%">Tên món:</th>
                    <td th:text="${newFood.name}"></td>
                </tr>
                <tr>
                    <th>Danh mục:</th>
                    <td th:text="${newFood.category}"></td>
                </tr>
                <tr>
                    <th>Giá tiền:</th>
                    <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(newFood.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                </tr>
                <tr>
                    <th>Đường dẫn file:</th>
                    <td><small class="text-muted" th:text="${newFood.imageUrl}"></small></td>
                </tr>
            </table>

            <div class="d-grid mt-4">
                <a th:href="@{/merchant/food/add}" class="btn btn-outline-primary">Quay lại thêm món khác</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
