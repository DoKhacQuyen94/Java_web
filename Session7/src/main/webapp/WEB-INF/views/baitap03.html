<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RikkeiFood - Thêm món ăn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { border-radius: 10px; padding: 10px 25px; }
        .error-msg { color: #dc3545; font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="text-center mb-4 text-primary">Thêm Món Ăn Mới</h2>

                <div th:if="${error}" class="alert alert-danger" role="alert">
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/merchant/food/add}" th:object="${food}" method="POST" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Tên món ăn:</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên món..." required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Danh mục:</label>
                        <select th:field="*{category}" class="form-select">
                            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Giá tiền (VNĐ):</label>
                        <input type="number" th:field="*{price}" class="form-control" step="1000" min="0" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Hình ảnh minh họa:</label>
                        <input type="file" name="image" class="form-control" accept="image/*" required>
                        <div class="form-text text-muted">Chỉ chấp nhận định dạng ảnh (.jpg, .png...) và tối đa 5MB.</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Lưu món ăn</button>
                        <a href="/merchant/food/list" class="btn btn-light">Hủy bỏ</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
